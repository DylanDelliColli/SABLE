# SABLE Multi-Manager Pattern: agent registry
# Install location: ~/.claude/sable/agents.yaml
#
# This file is the single source of truth for agent identities, scopes, and
# coordination rules. All multi-manager hooks read it dynamically. Adding,
# removing, or modifying an agent requires no hook code changes — just edit
# this file and create/update the matching role prompt in roles/<name>.md.

agents:
  optimus:
    type: epic_manager
    scope: "Large feature epics, hardening work, multi-bead sequences requiring continuity"
    claim_filter: "--has-parent"        # bd ready filter for general pool work
    inbox_label: for-optimus
    role_prompt: roles/optimus.md
    dispatches_workers: true

  tarzan:
    type: one_off_manager
    scope: "Bugfixes, one-offs, doc updates, anything standalone (regardless of priority)"
    claim_filter: "--no-parent"
    inbox_label: for-tarzan
    role_prompt: roles/tarzan.md
    dispatches_workers: true

  chuck:
    type: integrator
    scope: "Merge queue, PR review, conflict resolution, sequencing"
    claim_filter: "for-chuck-only"      # only acts on addressed coord beads
    inbox_label: for-chuck
    role_prompt: roles/chuck.md
    dispatches_workers: false

    # Chuck-specific: when to fix in place vs delegate to PR author
    fix_directly:
      - imports                # import order, grouping
      - lockfile               # package-lock.json, Cargo.lock, yarn.lock
      - whitespace             # formatting, trailing whitespace
      - non_overlapping_diffs  # different line ranges in same file
      - docs                   # pure documentation conflicts

    delegate_to_author:
      - overlapping_logic      # both branches modified the same logic
      - semantic_conflicts     # competing implementations
      - test_divergence        # test expectations differ
      - config_changes         # env defaults, feature flags

    post_push_autoack: true    # Chuck files an ack bead when PR is reviewed

  # Planning-session agent. Session-scoped, not continuous. User invokes
  # `critique` with a scope arg; agent explores, writes findings, self-reviews,
  # addresses to managers, exits. Never dispatched continuously.
  critique:
    type: auditor
    scope: "Read-only repo audit producing high-quality finding beads (design rot, redundancy, verbosity, dead code, test gaps)"
    claim_filter: null         # doesn't claim — pure producer
    inbox_label: null          # no inbox — invoked synchronously, scope from session args
    role_prompt: roles/critique.md
    dispatches_workers: true   # read-only Explore subagents only
    bead_template: templates/critique-bead.md   # required for all critique-finding beads
    quality_bar: above_default  # see role_prompt for what this means

  # Planning-session agent. Validates open beads against current HEAD,
  # updates or closes stale ones. Differential-validation optimization:
  # only re-validates beads whose cited paths have changed since last marker.
  doctor:
    type: bead_validator
    scope: "Validate open beads against current HEAD, update or close stale ones"
    claim_filter: null         # doesn't claim — operates over bd list
    inbox_label: for-doctor    # accepts freshness-pass requests from user/President only
    role_prompt: roles/doctor.md
    dispatches_workers: true   # read-only Explore subagents only
    auto_close_ramp_up: 5      # first 5 runs label doctor-suspects-stale only;
                                # after, auto-close stale-fixed beads
    validation_marker: doctor-validated-at  # appended to bead notes per validation

  # Planning-session agent. End-to-end browser validation against the
  # integration branch's dev deployment (Vercel preview + Supabase dev).
  # Does NOT run during execution sessions. Does NOT validate prod, PR
  # branches, or local dev servers.
  qa:
    type: quality_validator
    scope: "End-to-end validation on integration-branch dev deploys (Vercel preview + Supabase dev)"
    claim_filter: null         # doesn't claim — operates on user-invoked scope
    inbox_label: for-qa        # accepts validation requests from user only
    role_prompt: roles/qa.md
    dispatches_workers: false  # QA runs browser interaction itself; coherent session needed
    test_target:
      url_env: SABLE_QA_BASE_URL          # Vercel preview URL for integration branch
      supabase_env: SABLE_QA_SUPABASE_URL # Supabase dev project URL
      branch_env: SABLE_QA_INTEGRATION_BRANCH  # e.g. "dev"
      forbidden_targets:
        - production
        - pr_preview
        - local_dev_server

