# SABLE Multi-Manager Pattern: agent registry
# Install location: ~/.claude/sable/agents.yaml
#
# This file is the single source of truth for agent identities, scopes, and
# coordination rules. All multi-manager hooks read it dynamically. Adding,
# removing, or modifying an agent requires no hook code changes — just edit
# this file and create/update the matching role prompt in roles/<name>.md.
#
# Per-bead model selection: beads optionally carry a `model:<haiku|sonnet|
# opus>` label that drives worker model choice at dispatch time. The
# pre-dispatch-model-check.sh hook validates that the dispatch's model
# parameter matches the bead's label (or that the prompt includes a
# `Model override: <reason>` line). See SABLE.md §6.9 for the ladder rules
# and roles/optimus.md / roles/tarzan.md for per-manager guidance.

agents:
  optimus:
    type: epic_manager
    scope: "Large feature epics, hardening work, multi-bead sequences requiring continuity"
    claim_filter: "--has-parent"        # bd ready filter for general pool work
    inbox_label: for-optimus
    role_prompt: roles/optimus.md
    dispatches_workers: true

  tarzan:
    type: one_off_manager
    scope: "Bugfixes, one-offs, doc updates, anything standalone (regardless of priority)"
    claim_filter: "--no-parent"
    inbox_label: for-tarzan
    role_prompt: roles/tarzan.md
    dispatches_workers: true

  chuck:
    type: integrator
    scope: "Merge queue, PR review, conflict resolution, sequencing"
    claim_filter: "for-chuck-only"      # only acts on addressed coord beads
    inbox_label: for-chuck
    role_prompt: roles/chuck.md
    dispatches_workers: false

    # Chuck-specific: when to fix in place vs delegate to PR author
    fix_directly:
      - imports                # import order, grouping
      - lockfile               # package-lock.json, Cargo.lock, yarn.lock
      - whitespace             # formatting, trailing whitespace
      - non_overlapping_diffs  # different line ranges in same file
      - docs                   # pure documentation conflicts

    delegate_to_author:
      - overlapping_logic      # both branches modified the same logic
      - semantic_conflicts     # competing implementations
      - test_divergence        # test expectations differ
      - config_changes         # env defaults, feature flags

    post_push_autoack: true    # Chuck files an ack bead when PR is reviewed

  # Planning-session agent. Session-scoped, not continuous. User invokes
  # `sherlock` with a scope arg; agent explores, writes findings, self-reviews,
  # addresses to managers, exits. Never dispatched continuously.
  sherlock:
    type: auditor
    scope: "Read-only repo audit producing high-quality finding beads (design rot, redundancy, verbosity, dead code, test gaps)"
    claim_filter: null         # doesn't claim — pure producer
    inbox_label: null          # no inbox — invoked synchronously, scope from session args
    role_prompt: roles/sherlock.md
    dispatches_workers: true   # read-only Explore subagents only
    bead_template: templates/sherlock-bead.md   # required for all sherlock-finding beads
    quality_bar: above_default  # see role_prompt for what this means

  # Planning-session agent. Validates open beads against current HEAD,
  # updates or closes stale ones. Differential-validation optimization:
  # only re-validates beads whose cited paths have changed since last marker.
  victor:
    type: bead_validator
    scope: "Validate open beads against current HEAD, update or close stale ones"
    claim_filter: null         # doesn't claim — operates over bd list
    inbox_label: for-victor    # accepts freshness-pass requests from user/Lincoln only
    role_prompt: roles/victor.md
    dispatches_workers: true   # read-only Explore subagents only
    auto_close_ramp_up: 5      # first 5 runs label victor-suspects-stale only;
                                # after, auto-close stale-fixed beads
    validation_marker: victor-validated-at  # appended to bead notes per validation

  # Planning-session agent. End-to-end browser validation against the
  # integration branch's dev deployment (Vercel preview + Supabase dev).
  # Does NOT run during execution sessions. Does NOT validate prod, PR
  # branches, or local dev servers.
  rudy:
    type: quality_validator
    scope: "End-to-end validation on integration-branch dev deploys (Vercel preview + Supabase dev)"
    claim_filter: null         # doesn't claim — operates on user-invoked scope
    inbox_label: for-rudy      # accepts validation requests from user only
    role_prompt: roles/rudy.md
    dispatches_workers: false  # Rudy runs browser interaction itself; coherent session needed
    test_target:
      url_env: SABLE_RUDY_BASE_URL          # Vercel preview URL for integration branch
      supabase_env: SABLE_RUDY_SUPABASE_URL # Supabase dev project URL
      branch_env: SABLE_RUDY_INTEGRATION_BRANCH  # e.g. "dev"
      forbidden_targets:
        - production
        - pr_preview
        - local_dev_server

  # Planning-session agent. Test-coverage planner — interview the user about
  # what could break, then produce test beads + skeleton test files (forward
  # mode) or test-gap finding beads (audit mode). Read-only with respect to
  # source code; only writes test scaffolds and bead descriptions. Three
  # invocations:
  #   columbo --feature "<description>"   forward mode for new feature work
  #                                       that has no feature bead yet
  #   columbo --bead SABLE-xxx            forward mode that enriches an
  #                                       existing feature bead with child
  #                                       test beads + skeletons
  #   columbo --audit <path>              audit mode against an existing
  #                                       module — files columbo-test-gap
  #                                       beads where coverage is shallow
  # Pairs with the bead-description-gate to enforce templates/columbo-bead.md
  # required sections on both label families.
  columbo:
    type: test_planner
    scope: "Interview-driven test-coverage planning — produces test beads + skeleton test files (forward) or test-gap findings (audit)"
    claim_filter: null         # doesn't claim — pure producer, conversation-driven
    inbox_label: for-columbo   # accepts --bead requests from managers
    role_prompt: roles/columbo.md
    dispatches_workers: true   # read-only Explore subagents only
    bead_template: templates/columbo-bead.md   # required for all columbo beads
    quality_bar: above_default  # see role_prompt for what this means

  # Lincoln — the v2 main session (SABLE-uz9.5). One entry, two heritages
  # merged: the original Tier-3 strategist (status, arbitration, strategic
  # conversation) and the cockpit seat (mode-aware fleet launch). The user
  # talks to Lincoln in ONE window; /plan and /execute (skills/cockpit-plan,
  # cockpit-execute) flip the mode via bin/sable-mode, and the mode-state file
  # governs what Lincoln may spawn (cockpit-mode-interlock.sh, Bash + Agent
  # legs). Planning mode: walks the gated substages, spawning Tier-2 producers
  # as named subagents (gaudi runs as an inline skill). Execution mode: spawns
  # Optimus/Tarzan as manager subagents, executes their dispatch requests as
  # invisible background workers (Dispatching-for: attribution), pushes after
  # review, and brokers for-lincoln arbitration. Chuck remains an env-var
  # terminal (SABLE-uz9.6). "Cockpit" survives as the name of the mode
  # machinery — the seat, not the person.
  lincoln:
    type: cockpit
    scope: "The one operator-facing main session: strategist + mode-aware fleet launch; /plan fills the pool via producer subagents, /execute drains it via manager subagents + background workers"
    claim_filter: null         # doesn't claim — directs, dispatches, oversees
    inbox_label: for-lincoln   # arbitration asks from managers, direction from user
    role_prompt: roles/lincoln.md
    dispatches_workers: true   # executes manager dispatch requests as background workers
    cross_inbox_read: true     # must see every agent's plate to oversee both modes
    files_addressed_beads: true      # may file for-X coord/direction beads
    launches_fleets: true            # mode-aware fleet spawn (subagents, not terminals)

  # Seward — TEMPORARY strategist overlay (SABLE-nps). Second terminal beside
  # the Lincoln main session, exists ONLY because Lincoln is saturated by
  # dispatch logistics until nested subagents ship (watch SABLE-uz9.8 — when
  # managers self-dispatch, Lincoln's load collapses and Seward folds back
  # into him; delete this entry then). Seward is the conversation partner:
  # strategic discussion with the operator, status synthesis across all
  # inboxes, and for-lincoln direction beads the operational Lincoln picks up
  # between logistics ticks. Writes no code, never dispatches, never pushes.
  seward:
    type: strategist
    scope: "TEMPORARY strategist overlay: strategic conversation + status synthesis + for-lincoln direction beads while Lincoln orchestrates"
    claim_filter: null         # doesn't claim — pure interlocutor
    inbox_label: for-seward    # escalations the operator wants surfaced here
    role_prompt: roles/seward.md
    dispatches_workers: false  # read-only Explore at most; never workers
    cross_inbox_read: true     # status synthesis needs every lane's plate
    files_addressed_beads: true

